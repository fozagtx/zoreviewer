<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centered box</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(
            circle at 20% 20%,
            rgba(99, 102, 241, 0.25),
            transparent 45%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(236, 72, 153, 0.2),
            transparent 40%
          ),
          #0f1115;
        color: #e5e7eb;
      }

      .box {
        width: min(100%, 28rem);
        padding: 2rem 1.75rem;
        border-radius: 1rem;
        background: rgba(24, 27, 35, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
      }

      .circle-feature {
        width: 3.75rem;
        height: 3.75rem;
        margin: 0 auto 1.25rem;
        border-radius: 50%;
        background: radial-gradient(
            circle at 32% 28%,
            rgba(255, 255, 255, 0.35),
            transparent 55%
          ),
          linear-gradient(145deg, #6366f1, #a855f7 45%, #ec4899);
        box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.45);
        animation: circle-pulse 2.4s ease-in-out infinite;
      }

      @keyframes circle-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.45);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 0 14px rgba(99, 102, 241, 0);
          transform: scale(1.03);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .circle-feature {
          animation: none;
          box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }
      }

      .box h1 {
        margin: 0 0 0.5rem;
        font-size: 1.35rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .box p {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.55;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="circle-feature" role="img" aria-label="Decorative gradient circle"></div>
      <h1>Centered box</h1>
      <p>
        The page uses flexbox on <code>body</code> with
        <code>min-height: 100vh</code>, <code>align-items: center</code>, and
        <code>justify-content: center</code> so the box stays centered
        vertically and horizontally.
      </p>
    </div>
  </body>
</html>
